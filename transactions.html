<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet - Últimos Movimientos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="estilos.css">
  <link rel="icon" type="image/png" href="img\billetera-digital.png">
</head>
<body class="d-flex justify-content-center align-items-center vh-200">
  <div class="container bg-white p-5 rounded-5 text-secondary">
    <div class="text-center fs-1 fw-bold">Últimos Movimientos</div>

    <div class="mt-3">
      <label for="filterType" class="form-label">Filtrar por tipo:</label>
      <select id="filterType" class="form-select" onchange="mostrarUltimosMovimientos(this.value)">
        <option value="Todos">Todos</option>
        <option value="Compra">Compra</option>
        <option value="Depósito">Depósito</option>
        <option value="Envío">Envío</option>
        <option value="Transferencia recibida">Transferencia recibida</option>
      </select>
    </div>

    <ul id="listaMovimientos" class="list-group mt-3"></ul>
    <button type="button" class="btn bg-primary btn-info text-white w-100 mt-4" onclick="menu()">Volver al menú</button>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="validacion.js"></script>

  <footer class="footer-context">
       <p>&copy;2025 Wallet Digital - Creado por Gonzalo Vera</p> 
  </footer>
</body>
</html>
